<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <pattern id="weave" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="1.5" y="0" fill="#5c4f42" opacity="0.035" />
      <rect width="8" height="1" y="4" fill="#5c4f42" opacity="0.025" />
      <rect width="1.5" height="8" x="0" fill="#5c4f42" opacity="0.03" />
      <rect width="1" height="8" x="4" fill="#5c4f42" opacity="0.02" />
    </pattern>
    <filter id="sand-grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.07" />
      </feComponentTransfer>
    </filter>
    <filter id="stain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18" intercept="-0.04" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="160" height="160" fill="url(#weave)" />
  <rect width="160" height="160" filter="url(#sand-grain)" opacity="0.55" />
  <rect width="160" height="160" filter="url(#stain)" opacity="0.35" />
</svg>
